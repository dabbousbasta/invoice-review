<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>مراجعة أسعار الفواتير</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:system-ui;
background:#f5f5f5;
padding:10px
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:15px;
border-radius:8px
}

table{
width:100%;
border-collapse:collapse
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center
}

th{
background:#f0f0f0
}

.price-input{
width:100%;
border:none;
text-align:center
}

.modified{
background:#ffe7a3;
font-weight:bold
}

.total{
margin-top:10px;
font-size:18px;
font-weight:bold;
text-align:center;
background:#eef6ff;
padding:8px;
border-radius:6px
}

button{
padding:6px;
border:none;
border-radius:4px;
color:#fff;
cursor:pointer
}

.green{background:#28a745}
.blue{background:#17a2b8}
.wa{background:#25D366}

.controls{
display:flex;
gap:10px;
margin:10px 0
}

</style>

</head>

<body>

<div class="container">

<h2>مراجعة الفواتير</h2>

<select id="invoiceSelect">
<option>تحميل الفواتير...</option>
</select>

<div class="controls">

<button id="downloadOriginal" class="green">تحميل الأصلي</button>
<button id="downloadSimple" class="blue">تحميل مبسط</button>
<button id="shareWA" class="wa">إرسال واتساب</button>

</div>

<table>

<thead>
<tr>
<th>الوصف</th>
<th>الكمية</th>
<th>السعر</th>
</tr>
</thead>

<tbody id="items"></tbody>

</table>

<div id="total" class="total">إجمالي الفاتورة: 0</div>

</div>

<script>

const invoices={}
let currentInvoice=null

const select=document.getElementById("invoiceSelect")
const itemsBody=document.getElementById("items")
const totalBox=document.getElementById("total")

const STORAGE_KEY="invoice_edits"

let savedEdits=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")

discoverFiles()

async function discoverFiles(){

try{

const res = await fetch("invoices/list.php")

const files = await res.json()

loadInvoices(files)

}catch(e){

alert("فشل تحميل الفواتير")

}

}

async function loadInvoices(files){

for(let file of files){

const resp=await fetch("invoices/"+file)

const buf=await resp.arrayBuffer()

const wb=XLSX.read(buf)

const code=file.split("_")[0]

const data=extractData(wb)

invoices[code]={

file:file,
workbook:wb,
items:data.items

}

const opt=document.createElement("option")
opt.value=code
opt.textContent=code
select.appendChild(opt)

}

}

function extractData(workbook){

let items=[]

workbook.SheetNames.forEach(name=>{

const sheet=workbook.Sheets[name]
const range=XLSX.utils.decode_range(sheet['!ref'])

let header=-1
let desc=-1
let qty=-1
let price=-1

for(let r=0;r<40;r++){

for(let c=0;c<20;c++){

const cell=sheet[XLSX.utils.encode_cell({r,c})]

const txt=cell?String(cell.v).toLowerCase():""

if(txt.includes("description")){header=r;desc=c}
if(txt.includes("qty"))qty=c
if(txt.includes("price"))price=c

}

}

if(header==-1)return

for(let r=header+1;r<=range.e.r;r++){

const d=sheet[XLSX.utils.encode_cell({r,c:desc})]
const q=sheet[XLSX.utils.encode_cell({r,c:qty})]
const p=sheet[XLSX.utils.encode_cell({r,c:price})]

if(!d)break

items.push({

sheet:name,
row:r,
col:price,
desc:String(d.v),
qty:q?q.v:0,
price:p?p.v:0,
original:p?p.v:0

})

}

})

return{items}

}

select.addEventListener("change",()=>{

const code=select.value

currentInvoice=invoices[code]

restoreEdits(code)

render()

})

function render(){

itemsBody.innerHTML=""

currentInvoice.items.forEach((i,idx)=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${i.desc}</td>
<td>${i.qty}</td>
<td>
<input type="number"
class="price-input ${i.price!=i.original?'modified':''}"
value="${i.price}"
data-i="${idx}">
</td>
`

itemsBody.appendChild(tr)

})

updateTotal()

}

itemsBody.addEventListener("input",e=>{

if(!e.target.classList.contains("price-input"))return

const i=e.target.dataset.i

const val=parseFloat(e.target.value)||0

currentInvoice.items[i].price=val

if(val!=currentInvoice.items[i].original)
e.target.classList.add("modified")
else
e.target.classList.remove("modified")

saveEdits()

updateTotal()

})

itemsBody.addEventListener("focusin",e=>{

if(e.target.classList.contains("price-input"))
e.target.select()

})

itemsBody.addEventListener("keydown",e=>{

if(!e.target.classList.contains("price-input"))return

const idx=parseInt(e.target.dataset.i)

if(e.key==="Enter"||e.key==="ArrowDown"){

e.preventDefault()

const next=document.querySelector(`[data-i="${idx+1}"]`)

if(next)next.focus()

}

if(e.key==="ArrowUp"){

e.preventDefault()

const prev=document.querySelector(`[data-i="${idx-1}"]`)

if(prev)prev.focus()

}

})

document.addEventListener("keydown",e=>{

if(e.ctrlKey && e.key==="Enter"){

shareWhatsApp()

}

})

function updateTotal(){

let t=0

currentInvoice.items.forEach(i=>{

t+=i.qty*i.price

})

totalBox.textContent="إجمالي الفاتورة: "+t.toFixed(2)

}

function saveEdits(){

const code=select.value

savedEdits[code]=currentInvoice.items.map(i=>i.price)

localStorage.setItem(STORAGE_KEY,JSON.stringify(savedEdits))

}

function restoreEdits(code){

if(!savedEdits[code])return

savedEdits[code].forEach((p,i)=>{

currentInvoice.items[i].price=p

})

}

function applyChanges(){

currentInvoice.items.forEach(i=>{

const sheet=currentInvoice.workbook.Sheets[i.sheet]

const addr=XLSX.utils.encode_cell({r:i.row,c:i.col})

sheet[addr].v=i.price

})

}

function autoWidth(ws,data){

const w=[]

data.forEach(r=>{

r.forEach((c,i)=>{

const l=c?c.toString().length:10

w[i]=Math.max(w[i]||10,l)

})

})

ws['!cols']=w.map(v=>({wch:v+2}))

}

function buildData(){

const data=[

["الوصف","الكمية","السعر"]

]

currentInvoice.items.forEach(i=>{

data.push([i.desc,i.qty,i.price])

})

data.push(["",""])
data.push(["إجمالي",totalBox.textContent.split(":")[1]])

return data

}

document.getElementById("downloadSimple").onclick=()=>{

const wb=XLSX.utils.book_new()

const data=buildData()

const ws=XLSX.utils.aoa_to_sheet(data)

ws['!dir']="rtl"

autoWidth(ws,data)

XLSX.utils.book_append_sheet(wb,ws,"فاتورة")

XLSX.writeFile(wb,"invoice.xlsx")

}

document.getElementById("downloadOriginal").onclick=()=>{

applyChanges()

currentInvoice.workbook.SheetNames.forEach(n=>{

currentInvoice.workbook.Sheets[n]['!dir']="rtl"

})

XLSX.writeFile(currentInvoice.workbook,"updated.xlsx")

}

async function shareWhatsApp(){

applyChanges()

const wb=XLSX.utils.book_new()

const data=buildData()

const ws=XLSX.utils.aoa_to_sheet(data)

ws['!dir']="rtl"

autoWidth(ws,data)

XLSX.utils.book_append_sheet(wb,ws,"فاتورة")

const out=XLSX.write(wb,{type:"array",bookType:"xlsx"})

const blob=new Blob([out],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"})

const file=new File([blob],"invoice.xlsx")

if(navigator.canShare && navigator.canShare({files:[file]})){

await navigator.share({
files:[file],
title:"فاتورة"
})

}else{

XLSX.writeFile(wb,"invoice.xlsx")

}

}

document.getElementById("shareWA").onclick=shareWhatsApp

</script>

</body>
</html>

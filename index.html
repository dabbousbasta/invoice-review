<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مراجعة أسعار الفواتير - دبوس البسطة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f5f5f5; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; margin-top: 0; text-align: center; }
        .row { margin-bottom: 10px; }
        label { display: block; font-size: 14px; margin-bottom: 4px; }
        select, button, input[type="file"] { width: 100%; font-size: 14px; padding: 6px 8px; box-sizing: border-box; }
        button { cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 4px; margin-top: 5px; }
        button:disabled { background: #999; cursor: not-allowed; }
        .info-box { background: #f0f4ff; border-radius: 4px; padding: 8px; margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
        .label-title { font-weight: bold; }
        .value-box { background: #fafafa; border-radius: 4px; padding: 6px; margin-top: 4px; font-size: 13px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 4px 6px; text-align: center; }
        th { background: #f0f0f0; position: sticky; top: 0; z-index: 1; }
        tbody tr:nth-child(odd) { background: #fcfcfc; }
        tbody tr:nth-child(even) { background: #f6f6f6; }
        .price-input { width: 100%; border: none; background: transparent; text-align: center; font-size: 13px; padding: 2px; box-sizing: border-box; }
        .price-input:focus { outline: 2px solid #007bff; background: #fff; }
        .table-container { max-height: 60vh; overflow: auto; border: 1px solid #ddd; border-radius: 4px; margin-top: 10px; }
        .loading { font-size: 13px; color: #555; }
        .error { font-size: 13px; color: #b00020; }
        .success { color: #0a6c00; }
        .download-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .download-buttons button { flex: 1; min-width: 120px; }
        .download-original { background: #28a745; }
        .download-simple { background: #17a2b8; }
        .whatsapp-share { background: #25D366 !important; }
        .file-info { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔥 مراجعة وتعديل أسعار الفواتير</h1>
    <div class="info-box">
        ✅ **طريقتين للاختيار**:<br>
        1️⃣ **رفع ملف Excel مباشرة** (أسرع)<br>
        2️⃣ **اكتشاف تلقائي** من مجلد invoices/
    </div>

    <div class="row">
        <label for="fileInput">📁 رفع ملف Excel:</label>
        <input type="file" id="fileInput" accept=".xlsx,.xls" />
    </div>

    <div class="row">
        <button id="scanFolderBtn" onclick="scanFolder()">🔍 فحص مجلد invoices/</button>
    </div>

    <div id="status" class="loading">اختر ملف أو اضغط "فحص مجلد"</div>

    <div class="row">
        <label for="invoiceSelect">اختيار الفاتورة:</label>
        <select id="invoiceSelect" disabled>
            <option value="">— اختر فاتورة —</option>
        </select>
        <div id="fileInfo" class="file-info"></div>
    </div>

    <div class="row">
        <span class="label-title">اسم الحساب:</span>
        <div id="accountName" class="value-box">—</div>
    </div>

    <div class="row">
        <span class="label-title">بيان الفاتورة:</span>
        <div id="invoiceDescription" class="value-box">—</div>
    </div>

    <div class="row download-buttons">
        <button id="downloadOriginalBtn" disabled class="download-original">الأصلي المحدث</button>
        <button id="downloadSimpleBtn" disabled class="download-simple">النسخة المبسطة</button>
        <button id="whatsappShareBtn" disabled class="whatsapp-share">📱 إرسال للواتساب</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr><th>الوصف</th><th>الكمية</th><th>السعر (U.Price)</th></tr>
            </thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </div>
</div>

<script>
    const invoices = {};
    let currentInvoiceCode = null;
    let currentInvoiceData = null;

    // Elements
    const fileInput = document.getElementById('fileInput');
    const invoiceSelect = document.getElementById('invoiceSelect');
    const fileInfoDiv = document.getElementById('fileInfo');
    const accountNameDiv = document.getElementById('accountName');
    const invoiceDescDiv = document.getElementById('invoiceDescription');
    const itemsBody = document.getElementById('itemsBody');
    const downloadOriginalBtn = document.getElementById('downloadOriginalBtn');
    const downloadSimpleBtn = document.getElementById('downloadSimpleBtn');
    const whatsappShareBtn = document.getElementById('whatsappShareBtn');
    const statusDiv = document.getElementById('status');

    // Event Listeners
    fileInput.addEventListener('change', handleFileUpload);
    invoiceSelect.addEventListener('change', handleInvoiceChange);
    downloadOriginalBtn.addEventListener('click', handleDownloadOriginal);
    downloadSimpleBtn.addEventListener('click', handleDownloadSimple);
    whatsappShareBtn.addEventListener('click', handleWhatsAppShare);

    // ✅ طريقة 1: رفع ملف مباشرة (الأسرع)
    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        statusDiv.textContent = '⏳ جاري تحميل الملف...';
        statusDiv.className = 'loading';

        try {
            const arrayBuffer = await file.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
            
            const fileName = file.name.replace(/\.(xlsx|xls)$/i, '');
            const meta = extractInvoiceDataFromAllSheets(workbook, file.name);
            
            if (meta.items.length > 0) {
                invoices[fileName] = {
                    fileName: file.name,
                    workbook: workbook,
                    items: meta.items,
                    accountName: meta.accountName,
                    invoiceDesc: meta.invoiceDesc,
                    sheetCount: meta.sheetCount,
                    totalItems: meta.items.length,
                    originalFile: file
                };

                populateInvoiceSelect([fileName]);
                statusDiv.textContent = `✅ تم تحميل ${file.name}`;
                statusDiv.className = 'success';
            } else {
                statusDiv.textContent = '❌ الملف لا يحتوي على بيانات فواتير صالحة';
                statusDiv.className = 'error';
            }
        } catch (err) {
            statusDiv.textContent = '❌ خطأ في تحميل الملف';
            statusDiv.className = 'error';
            console.error(err);
        }
    }

    // ✅ طريقة 2: فحص مجلد بسرعة (10 ملفات فقط)
    window.scanFolder = async function() {
        statusDiv.textContent = '🔍 فحص سريع لمجلد invoices/...';
        statusDiv.className = 'loading';

        const commonFiles = [
            'SA-1.xlsx', 'SA-2.xlsx', 'SA-3.xlsx', 'SA-4.xlsx', 'SA-5.xlsx',
            'SA-10.xlsx', 'SA-88.xlsx', 'SA-101.xlsx', 'SA-102.xlsx', 'SA-610.xlsx',
            'فاتورة.xlsx', 'invoice.xlsx'
        ];

        const foundFiles = [];
        for (let fileName of commonFiles) {
            if (await fileExists(`invoices/${fileName}`)) {
                foundFiles.push(fileName);
            }
        }

        if (foundFiles.length === 0) {
            statusDiv.textContent = '❌ لم يُعثر على ملفات في invoices/. جرب رفع ملف مباشرة';
            statusDiv.className = 'error';
            return;
        }

        await loadAllInvoices(foundFiles);
    };

    // اختبار وجود ملف بسرعة
    async function fileExists(filePath) {
        try {
            const response = await fetch(filePath, { method: 'HEAD', cache: 'no-cache' });
            return response.ok;
        } catch {
            return false;
        }
    }

    // قراءة كل الصفحات من ملف
    function extractInvoiceDataFromAllSheets(workbook, fileName) {
        let allItems = [];
        let accountName = '', invoiceDesc = '';
        let sheetCount = 0;

        workbook.SheetNames.forEach((sheetName) => {
            const sheet = workbook.Sheets[sheetName];
            if (!sheet || !sheet['!ref']) return;

            sheetCount++;
            const range = XLSX.utils.decode_range(sheet['!ref']);
            const sheetMeta = extractSheetData(sheet, range);
            
            accountName = sheetMeta.accountName || accountName;
            invoiceDesc = sheetMeta.invoiceDesc || invoiceDesc;
            allItems = allItems.concat(sheetMeta.items.map(item => ({
                ...item,
                sheetName: sheetName
            })));
        });

        return { accountName, invoiceDesc, items: allItems, sheetCount };
    }

    function extractSheetData(sheet, range) {
        let accountName = '', invoiceDesc = '', items = [];

        accountName = readMergedRow(sheet, [9, 10], 0, 20);
        invoiceDesc = readMergedRow(sheet, [11, 12], 0, 20);

        let headerRow = -1, colDesc = -1, colQty = -1, colPrice = -1;
        
        for (let r = 0; r <= Math.min(range.e.r, 50); r++) {
            const rowValues = [];
            for (let c = 0; c <= Math.min(range.e.c, 25); c++) {
                const cellAddr = XLSX.utils.encode_cell({ r, c });
                const cell = sheet[cellAddr];
                rowValues.push(cell ? String(cell.v || '').trim().toLowerCase() : '');
            }

            const hasDesc = rowValues.some(v => v.includes('description') || v.includes('وصف'));
            const hasQty = rowValues.some(v => v.includes('qty') || v.includes('كمية'));
            const hasPrice = rowValues.some(v => v.includes('price') || v.includes('سعر') || v.includes('u.'));

            if (hasDesc && hasQty && hasPrice) {
                headerRow = r;
                for (let c = 0; c <= range.e.c; c++) {
                    const cellAddr = XLSX.utils.encode_cell({ r, c });
                    const cell = sheet[cellAddr];
                    const txt = cell ? String(cell.v || '').toLowerCase() : '';
                    if (txt.includes('description') || txt.includes('وصف')) colDesc = c;
                    if (txt.includes('qty') || txt.includes('كمية')) colQty = c;
                    if (txt.includes('price') || txt.includes('سعر') || txt.includes('u.')) colPrice = c;
                }
                break;
            }
        }

        if (headerRow === -1 || colDesc === -1 || colQty === -1 || colPrice === -1) {
            return { accountName, invoiceDesc, items };
        }

        for (let r = headerRow + 1; r <= range.e.r; r++) {
            const descCell = sheet[XLSX.utils.encode_cell({ r, c: colDesc })];
            const desc = descCell ? String(descCell.v || '').trim() : '';
            if (!desc || desc.length < 2) continue;

            const qtyCell = sheet[XLSX.utils.encode_cell({ r, c: colQty })];
            const priceCell = sheet[XLSX.utils.encode_cell({ r, c: colPrice })];

            items.push({
                row: r,
                colPrice: colPrice,
                description: desc,
                qty: qtyCell ? parseFloat(qtyCell.v) || 0 : 0,
                price: priceCell ? parseFloat(priceCell.v) || 0 : 0
            });
        }

        return { accountName, invoiceDesc, items };
    }

    function readMergedRow(sheet, rowsArray, colStart, colEnd) {
        let textParts = [];
        rowsArray.forEach(r => {
            for (let c = colStart; c <= colEnd; c++) {
                const cellAddr = XLSX.utils.encode_cell({ r, c });
                const cell = sheet[cellAddr];
                if (cell && cell.v) textParts.push(String(cell.v).trim());
            }
        });
        return Array.from(new Set(textParts.filter(Boolean))).join(' / ');
    }

    async function loadAllInvoices(fileList) {
        statusDiv.textContent = `⏳ تحميل ${fileList.length} ملف...`;
        
        for (let fileName of fileList) {
            try {
                const response = await fetch(`invoices/${fileName}`);
                if (!response.ok) continue;
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                
                const meta = extractInvoiceDataFromAllSheets(workbook, fileName);
                if (meta.items.length > 0) {
                    const invoiceCode = fileName.replace(/\.(xlsx|xls)$/i, '');
                    invoices[invoiceCode] = {
                        fileName: fileName,
                        workbook: workbook,
                        items: meta.items,
                        accountName: meta.accountName,
                        invoiceDesc: meta.invoiceDesc,
                        sheetCount: meta.sheetCount,
                        totalItems: meta.items.length
                    };
                }
            } catch (err) {
                console.error(`خطأ في ${fileName}:`, err);
            }
        }
        
        const codes = Object.keys(invoices);
        if (codes.length > 0) {
            populateInvoiceSelect(codes);
            statusDiv.textContent = `✅ ${codes.length} فاتورة جاهزة`;
            statusDiv.className = 'success';
        } else {
            statusDiv.textContent = '❌ لا توجد فواتير صالحة';
            statusDiv.className = 'error';
        }
    }

    function populateInvoiceSelect(codes) {
        invoiceSelect.innerHTML = '<option value="">— اختر فاتورة —</option>';
        codes.forEach(code => {
            const inv = invoices[code];
            const opt = document.createElement('option');
            opt.value = code;
            opt.textContent = `${code} (${inv.fileName}) | ${inv.totalItems} صنف`;
            invoiceSelect.appendChild(opt);
        });
        invoiceSelect.disabled = false;
    }

    function handleInvoiceChange() {
        const invoiceCode = invoiceSelect.value;
        if (!invoiceCode || !invoices[invoiceCode]) return;

        currentInvoiceCode = invoiceCode;
        currentInvoiceData = invoices[invoiceCode];
        const inv = currentInvoiceData;

        accountNameDiv.textContent = inv.accountName || 'غير متوفر';
        invoiceDescDiv.textContent = inv.invoiceDesc || 'غير متوفر';
        fileInfoDiv.innerHTML = `📄 <strong>${inv.fileName}</strong><br>${inv.sheetCount} صفحة | ${inv.totalItems} صنف`;

        renderItemsTable(inv.items);
        downloadOriginalBtn.disabled = false;
        downloadSimpleBtn.disabled = false;
        whatsappShareBtn.disabled = false;
    }

    function renderItemsTable(items) {
        itemsBody.innerHTML = '';
        items.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.description || ''}</td>
                <td>${item.qty || ''}</td>
                <td><input type="number" step="0.01" class="price-input" 
                           value="${item.price || ''}" data-index="${index}"></td>
            `;
            itemsBody.appendChild(tr);
        });

        itemsBody.querySelectorAll('.price-input').forEach((input, idx) => {
            input.addEventListener('focus', function() { this.select(); });
            input.addEventListener('input', function() {
                const idx = parseInt(this.dataset.index);
                currentInvoiceData.items[idx].price = this.value === '' ? '' : parseFloat(this.value);
            });
        });
    }

    function handleDownloadOriginal() {
        if (!currentInvoiceData) return;
        const inv = currentInvoiceData;

        inv.items.forEach(item => {
            const sheet = inv.workbook.Sheets[item.sheetName];
            const cellAddr = XLSX.utils.encode_cell({ r: item.row, c: item.colPrice });
            if (!sheet[cellAddr]) sheet[cellAddr] = { t: 'n', v: 0 };
            sheet[cellAddr].t = 'n';
            sheet[cellAddr].v = item.price === '' ? 0 : parseFloat(item.price || 0);
        });

        const wbout = XLSX.write(inv.workbook, { bookType: 'xlsx', type: 'array' });
        downloadFile(wbout, inv.fileName.replace(/\.(xlsx|xls)$/i, '_محدث.xlsx'));
    }

    function handleDownloadSimple() {
        if (!currentInvoiceData) return;
        const wb = XLSX.utils.book_new();
        const ws_data = [
            [`الملف: ${currentInvoiceData.fileName}`],
            [`الفاتورة: ${currentInvoiceCode}`],
            ['الوصف', 'الكمية', 'السعر']
        ];

        currentInvoiceData.items.forEach(item => {
            ws_data.push([item.description || '', item.qty || 0, item.price || 0]);
        });

        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        XLSX.utils.book_append_sheet(wb, ws, 'فاتورة محدثة');
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        downloadFile(wbout, `${currentInvoiceCode}_مبسط.xlsx`);
    }

    function handleWhatsAppShare() {
        handleDownloadSimple(); // نفس النسخة المبسطة للواتساب
    }

    function downloadFile(wbout, filename) {
        const blob = new Blob([wbout], { type: "application/octet-stream" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مراجعة أسعار الفواتير</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:system-ui;
background:#f5f5f5;
margin:0;
padding:10px
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:15px;
border-radius:8px
}

table{
width:100%;
border-collapse:collapse
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center
}

th{
background:#f0f0f0
}

.price-input{
width:100%;
border:none;
text-align:center
}

.price-input.modified{
background:#ffe7a3;
font-weight:bold
}

.download-buttons{
display:flex;
gap:10px;
margin:10px 0
}

button{
padding:6px;
border:none;
border-radius:4px;
color:#fff;
cursor:pointer
}

.download-original{background:#28a745}
.download-simple{background:#17a2b8}
.whatsapp-share{background:#25D366}

.total-box{
margin-top:10px;
font-size:18px;
font-weight:bold;
text-align:center;
background:#f0f7ff;
padding:8px;
border-radius:6px
}

</style>
</head>

<body>

<div class="container">

<h2>مراجعة وتعديل أسعار الفواتير</h2>

<select id="invoiceSelect" disabled>
<option value="">— اختر فاتورة —</option>
</select>

<div class="download-buttons">
<button id="downloadOriginalBtn" disabled class="download-original">الأصلي المحدث</button>
<button id="downloadSimpleBtn" disabled class="download-simple">النسخة المبسطة</button>
<button id="whatsappShareBtn" disabled class="whatsapp-share">📱 إرسال واتساب</button>
</div>

<table>

<thead>
<tr>
<th>الوصف</th>
<th>الكمية</th>
<th>السعر</th>
</tr>
</thead>

<tbody id="itemsBody"></tbody>

</table>

<div id="totalBox" class="total-box">
إجمالي الفاتورة: 0
</div>

</div>

<script>

const invoices={}
let currentInvoiceCode=null
let currentInvoiceData=null

const invoiceSelect=document.getElementById('invoiceSelect')
const itemsBody=document.getElementById('itemsBody')
const totalBox=document.getElementById('totalBox')

const downloadOriginalBtn=document.getElementById('downloadOriginalBtn')
const downloadSimpleBtn=document.getElementById('downloadSimpleBtn')
const whatsappShareBtn=document.getElementById('whatsappShareBtn')

invoiceSelect.addEventListener('change',handleInvoiceChange)
downloadOriginalBtn.addEventListener('click',handleDownloadOriginal)
downloadSimpleBtn.addEventListener('click',handleDownloadSimple)
whatsappShareBtn.addEventListener('click',handleWhatsAppShare)

discoverExcelFiles()

async function discoverExcelFiles(){

const knownFiles=[
'SA-88_53000101_260312_150337.xlsx',
'SA-89_53000101_260312_150337.xlsx',
'SA-90_53000101_260312_150337.xlsx'
]

const existing=[]

for(let file of knownFiles){

try{
const r=await fetch(`invoices/${file}`)
if(r.ok)existing.push(file)
}catch(e){}

}

loadAllInvoices(existing)

}

async function loadAllInvoices(files){

for(let file of files){

const resp=await fetch(`invoices/${file}`)
const buf=await resp.arrayBuffer()

const workbook=XLSX.read(new Uint8Array(buf),{type:'array'})

const code=file.split('_')[0]

const meta=extractInvoiceData(workbook)

invoices[code]={
fileName:file,
workbook:workbook,
items:meta.items
}

}

const codes=Object.keys(invoices)

codes.forEach(c=>{

const opt=document.createElement('option')
opt.value=c
opt.textContent=c

invoiceSelect.appendChild(opt)

})

invoiceSelect.disabled=false

}

function extractInvoiceData(workbook){

let items=[]

workbook.SheetNames.forEach(sheetName=>{

const sheet=workbook.Sheets[sheetName]
const range=XLSX.utils.decode_range(sheet['!ref'])

let headerRow=-1
let colDesc=-1
let colQty=-1
let colPrice=-1

for(let r=0;r<30;r++){

for(let c=0;c<20;c++){

const cell=sheet[XLSX.utils.encode_cell({r,c})]
const txt=cell?String(cell.v).toLowerCase():""

if(txt.includes('description')){headerRow=r;colDesc=c}
if(txt.includes('qty'))colQty=c
if(txt.includes('price')||txt.includes('u.'))colPrice=c

}

}

if(headerRow==-1)return

for(let r=headerRow+1;r<=range.e.r;r++){

const descCell=sheet[XLSX.utils.encode_cell({r,c:colDesc})]
const qtyCell=sheet[XLSX.utils.encode_cell({r,c:colQty})]
const priceCell=sheet[XLSX.utils.encode_cell({r,c:colPrice})]

if(!descCell)break

items.push({

sheetName:sheetName,
row:r,
colPrice:colPrice,
description:String(descCell.v),
qty:qtyCell?qtyCell.v:0,
price:priceCell?priceCell.v:0,
originalPrice:priceCell?priceCell.v:0

})

}

})

return{items}

}

function handleInvoiceChange(){

const code=invoiceSelect.value
if(!code)return

currentInvoiceCode=code
currentInvoiceData=invoices[code]

renderItemsTable(currentInvoiceData.items)

downloadOriginalBtn.disabled=false
downloadSimpleBtn.disabled=false
whatsappShareBtn.disabled=false

updateTotal()

}

function renderItemsTable(items){

itemsBody.innerHTML=""

items.forEach((item,i)=>{

const tr=document.createElement('tr')

tr.innerHTML=`

<td>${item.description}</td>
<td>${item.qty}</td>
<td>
<input type="number" step="0.01"
class="price-input"
value="${item.price}"
data-index="${i}">
</td>

`

itemsBody.appendChild(tr)

})

document.querySelectorAll('.price-input').forEach(input=>{

input.addEventListener('input',function(){

const i=this.dataset.index
const val=parseFloat(this.value)||0

currentInvoiceData.items[i].price=val

if(val!=currentInvoiceData.items[i].originalPrice){
this.classList.add('modified')
}else{
this.classList.remove('modified')
}

updateTotal()

})

})

}

function updateTotal(){

let total=0

currentInvoiceData.items.forEach(i=>{
total+=i.qty*i.price
})

totalBox.textContent="إجمالي الفاتورة: "+total.toFixed(2)

}

function autoWidth(ws,data){

const widths=[]

data.forEach(row=>{

row.forEach((cell,i)=>{

const len=cell?cell.toString().length:10
widths[i]=Math.max(widths[i]||10,len)

})

})

ws['!cols']=widths.map(w=>({wch:w+2}))

}

function handleDownloadOriginal(){

const inv=currentInvoiceData

inv.items.forEach(item=>{

const sheet=inv.workbook.Sheets[item.sheetName]
const addr=XLSX.utils.encode_cell({r:item.row,c:item.colPrice})

sheet[addr].v=item.price

})

inv.workbook.SheetNames.forEach(name=>{
inv.workbook.Sheets[name]['!rtl']=true
})

const wbout=XLSX.write(inv.workbook,{bookType:'xlsx',type:'array'})

downloadFile(wbout,inv.fileName.replace('.xlsx','_محدث.xlsx'))

}

function handleDownloadSimple(){

const wb=XLSX.utils.book_new()

const data=[
['رقم الفاتورة',currentInvoiceCode],
[''],
['الوصف','الكمية','السعر']
]

currentInvoiceData.items.forEach(i=>{
data.push([i.description,i.qty,i.price])
})

data.push([''])
data.push(['إجمالي الفاتورة',updateTotalValue()])

const ws=XLSX.utils.aoa_to_sheet(data)

ws['!rtl']=true
autoWidth(ws,data)

XLSX.utils.book_append_sheet(wb,ws,'فاتورة')

const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'})

downloadFile(wbout,currentInvoiceCode+"_مبسط.xlsx")

}

function updateTotalValue(){

let total=0

currentInvoiceData.items.forEach(i=>{
total+=i.qty*i.price
})

return total.toFixed(2)

}

async function handleWhatsAppShare(){

const wb=XLSX.utils.book_new()

const data=[
['رقم الفاتورة',currentInvoiceCode],
[''],
['الوصف','الكمية','السعر']
]

currentInvoiceData.items.forEach(i=>{
data.push([i.description,i.qty,i.price])
})

data.push([''])
data.push(['إجمالي الفاتورة',updateTotalValue()])

const ws=XLSX.utils.aoa_to_sheet(data)

ws['!rtl']=true
autoWidth(ws,data)

XLSX.utils.book_append_sheet(wb,ws,'فاتورة')

const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'})

const blob=new Blob([wbout],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"})
const file=new File([blob],`${currentInvoiceCode}.xlsx`)

if(navigator.canShare && navigator.canShare({files:[file]})){

await navigator.share({
files:[file],
title:"فاتورة محدثة"
})

}else{

downloadFile(wbout,currentInvoiceCode+".xlsx")

}

}

function downloadFile(data,filename){

const blob=new Blob([data],{type:"application/octet-stream"})
const a=document.createElement('a')

a.href=URL.createObjectURL(blob)
a.download=filename

document.body.appendChild(a)
a.click()
document.body.removeChild(a)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مراجعة أسعار الفواتير - دبوس البسطة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* نفس الستايل السابق بدون تغيير */
        body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f5f5f5; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; margin-top: 0; text-align: center; }
        .row { margin-bottom: 10px; }
        label { display: block; font-size: 14px; margin-bottom: 4px; }
        select, button { width: 100%; font-size: 14px; padding: 6px 8px; box-sizing: border-box; }
        button { cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 4px; margin-top: 5px; }
        button:disabled { background: #999; cursor: not-allowed; }
        .info-box { background: #f0f4ff; border-radius: 4px; padding: 8px; margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
        .label-title { font-weight: bold; }
        .value-box { background: #fafafa; border-radius: 4px; padding: 6px; margin-top: 4px; font-size: 13px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 4px 6px; text-align: center; }
        th { background: #f0f0f0; position: sticky; top: 0; z-index: 1; }
        tbody tr:nth-child(odd) { background: #fcfcfc; }
        tbody tr:nth-child(even) { background: #f6f6f6; }
        .price-input { width: 100%; border: none; background: transparent; text-align: center; font-size: 13px; padding: 2px; box-sizing: border-box; }
        .price-input:focus { outline: 2px solid #007bff; background: #fff; }
        .table-container { max-height: 60vh; overflow: auto; border: 1px solid #ddd; border-radius: 4px; margin-top: 10px; }
        .footer-note { font-size: 11px; color: #666; margin-top: 10px; text-align: center; }
        .loading { font-size: 13px; color: #555; }
        .error { font-size: 13px; color: #b00020; }
        .success { color: #0a6c00; }
        .download-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .download-buttons button { flex: 1; min-width: 140px; }
        .download-original { background: #28a745; }
        .download-simple { background: #17a2b8; }
        .whatsapp-share { background: #25D366 !important; font-size: 16px !important; }
    </style>
</head>
<body>
<div class="container">
    <h1>مراجعة وتعديل أسعار الفواتير</h1>
    <div class="info-box">
        عدّل الأسعار واضغط <strong>Enter</strong> للانتقال للصنف التالي.<br>
        <strong>إرسال للواتساب</strong> = تحميل + مشاركة Excel مباشرة 📱
    </div>

    <div id="status" class="loading">جاري تحميل الفواتير...</div>

    <div class="row">
        <label for="invoiceSelect">اختيار الفاتورة:</label>
        <select id="invoiceSelect" disabled>
            <option value="">— اختر فاتورة —</option>
        </select>
    </div>

    <div class="row">
        <span class="label-title">اسم الحساب:</span>
        <div id="accountName" class="value-box">—</div>
    </div>

    <div class="row">
        <span class="label-title">بيان الفاتورة:</span>
        <div id="invoiceDescription" class="value-box">—</div>
    </div>

    <div class="row download-buttons">
        <button id="downloadOriginalBtn" disabled class="download-original">الأصلي المحدث</button>
        <button id="downloadSimpleBtn" disabled class="download-simple">النسخة المبسطة</button>
        <button id="whatsappShareBtn" disabled class="whatsapp-share">📱 إرسال للواتساب</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الوصف</th>
                    <th>الكمية</th>
                    <th>السعر (U.Price)</th>
                </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </div>
</div>

<script>
    // نفس الكود السابق مع إضافة زر الواتساب فقط
    const invoices = {};
    let currentInvoiceCode = null;
    let currentInvoiceData = null;

    const invoiceSelect = document.getElementById('invoiceSelect');
    const accountNameDiv = document.getElementById('accountName');
    const invoiceDescDiv = document.getElementById('invoiceDescription');
    const itemsBody = document.getElementById('itemsBody');
    const downloadOriginalBtn = document.getElementById('downloadOriginalBtn');
    const downloadSimpleBtn = document.getElementById('downloadSimpleBtn');
    const whatsappShareBtn = document.getElementById('whatsappShareBtn');
    const statusDiv = document.getElementById('status');

    invoiceSelect.addEventListener('change', handleInvoiceChange);
    downloadOriginalBtn.addEventListener('click', handleDownloadOriginal);
    downloadSimpleBtn.addEventListener('click', handleDownloadSimple);
    whatsappShareBtn.addEventListener('click', handleWhatsAppShare);

    // ملفاتك الموجودة
    const knownFiles = [
        'SA-88_53000101_260312_150337.xlsx',
        'SA-89_53000101_260312_150337.xlsx', 
        'SA-90_53000101_260312_150337.xlsx'
    ];

    loadAllInvoices(knownFiles);

    // باقي الدوال نفسها تماماً (loadAllInvoices, extractInvoiceData, readMergedRow, etc...)
    // [نفس الكود السابق بدون تغيير]

    async function loadAllInvoices(fileList) {
        statusDiv.textContent = `جاري تحميل ${fileList.length} فاتورة...`;
        
        const promises = fileList.map(async (fileName) => {
            try {
                const resp = await fetch(`invoices/${fileName}`);
                if (!resp.ok) return;
                
                const buf = await resp.arrayBuffer();
                const workbook = XLSX.read(new Uint8Array(buf), { type: 'array' });

                const baseName = fileName.replace(/\.[^.]+$/, '');
                const invoiceCode = baseName.split('_')[0];

                const meta = extractInvoiceData(workbook);
                
                invoices[invoiceCode] = {
                    fileName: fileName,
                    workbook: workbook,
                    items: meta.items,
                    accountName: meta.accountName,
                    invoiceDesc: meta.invoiceDesc
                };
                
            } catch (err) {
                console.error(`خطأ في ${fileName}:`, err);
            }
        });

        await Promise.all(promises);
        
        const codes = Object.keys(invoices);
        if (codes.length === 0) {
            statusDiv.textContent = 'لم يتم تحميل أي فاتورة. تأكد من الملفات في invoices/.';
            statusDiv.className = 'error';
            return;
        }
        
        statusDiv.textContent = `تم تحميل ${codes.length} فاتورة ✓`;
        statusDiv.className = 'success';
        
        invoiceSelect.innerHTML = '<option value="">— اختر فاتورة —</option>';
        codes.sort().forEach(code => {
            const inv = invoices[code];
            const opt = document.createElement('option');
            opt.value = code;
            opt.textContent = `${code} (${inv.items.length || 0} صنف)`;
            invoiceSelect.appendChild(opt);
        });
        invoiceSelect.disabled = false;
    }

    // 🔥 الدالة الجديدة: مشاركة مع الواتساب
    async function handleWhatsAppShare() {
        if (!currentInvoiceData) return;

        statusDiv.textContent = 'جاري إعداد الملف للمشاركة...';
        
        // إنشاء النسخة المبسطة
        const wb = XLSX.utils.book_new();
        const ws_data = [
            [`رقم الفاتورة: ${currentInvoiceCode}`],
            [''],
            [`اسم الحساب: ${currentInvoiceData.accountName || 'غير محدد'}`],
            [`بيان الفاتورة: ${currentInvoiceData.invoiceDesc || 'غير محدد'}`],
            [''],
            ['الوصف', 'الكمية', 'السعر الافرادي (U.Price)']
        ];

        currentInvoiceData.items.forEach(item => {
            ws_data.push([
                item.description || '',
                item.qty || 0,
                item.price !== undefined && item.price !== '' ? item.price : 0
            ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        XLSX.utils.book_append_sheet(wb, ws, 'فاتورة محدثة');

        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        
        // 🎯 المشاركة التلقائية 📱
        const blob = new Blob([wbout], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const file = new File([blob], `${currentInvoiceCode}_محدث.xlsx`, { type: blob.type });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            // الموبايل: شاشة مشاركة كاملة
            try {
                await navigator.share({
                    files: [file],
                    title: `فاتورة ${currentInvoiceCode} محدثة`,
                    text: `تم تحديث أسعار الفاتورة ${currentInvoiceCode}`
                });
                statusDiv.textContent = '✅ تمت المشاركة بنجاح!';
                statusDiv.className = 'success';
            } catch (err) {
                console.log('❌ مشاركة فشلت، جاري التحميل العادي');
                downloadFile(wbout, `${currentInvoiceCode}_محدث.xlsx`);
            }
        } else {
            // الكمبيوتر: تحميل عادي
            downloadFile(wbout, `${currentInvoiceCode}_محدث.xlsx`);
            statusDiv.textContent = '✅ تم تحميل الملف، شاركه على الواتساب';
            statusDiv.className = 'success';
        }
    }

    // باقي الدوال نفسها (extractInvoiceData, handleDownloadSimple, etc...)
    function extractInvoiceData(workbook) {
        let accountName = '', invoiceDesc = '', items = [];
        // [نفس الكود السابق]
        return { accountName, invoiceDesc, items };
    }

    function downloadFile(wbout, filename) {
        const blob = new Blob([wbout], { type: "application/octet-stream" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // [باقي الدوال كما هي...]
</script>
</body>
</html>
